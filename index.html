<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>RetroInvest</title>
  <meta name="theme-color" content="#0c0c14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="RetroInvest"/>

  <script id="manifest-data" type="application/json">
  {
    "name": "RetroInvest",
    "short_name": "RetroInvest",
    "description": "Nintendo DS Investment Tracker",
    "start_url": "./index.html",
    "display": "standalone",
    "background_color": "#0c0c14",
    "theme_color": "#0c0c14",
    "orientation": "portrait-primary",
    "icons": [
      { "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%230c0c14'/><text y='130' x='96' text-anchor='middle' font-size='110'>🎮</text></svg>", "sizes": "192x192", "type": "image/svg+xml" },
      { "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%230c0c14'/><text y='360' x='256' text-anchor='middle' font-size='300'>🎮</text></svg>", "sizes": "512x512", "type": "image/svg+xml" }
    ]
  }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #0c0c14; }
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;


const LS = {
  get: k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

const today = () => new Date().toISOString().slice(0, 10);
const fmtDate = d => { try { const [y, m, day] = d.split("-"); return `${day}.${m}.${y.slice(2)}`; } catch { return d; } };


// ── Cover color palette ──────────────────────────────────────────────────────
const COVER_COLORS = [
  ["#1a3a2a","#00d97e"], ["#2a1a3a","#c77dff"], ["#3a2a1a","#ff9f43"],
  ["#1a2a3a","#4ecdc4"], ["#3a1a1a","#ff6b6b"], ["#2a3a1a","#6bcb77"],
  ["#1a1a3a","#4361ee"], ["#3a1a2a","#f72585"],
];
const getCoverColors = (name) => COVER_COLORS[name.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % COVER_COLORS.length];

function makeHistory(base, days = 90) {
  return Array.from({ length: days + 1 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (days - i));
    const drift = 1 + (i / days) * 0.22 + Math.sin(i * 0.4) * 0.03;
    return { date: d.toISOString().slice(0, 10), complete: Math.round(base * drift) };
  });
}

const DEMO = [
  { id: 1, name: "Demo-Spiel", history: makeHistory(95), isDemo: true, coverImg: null },
];

function analyze(game) {
  const p = game.history.map(h => h.complete);
  if (p.length < 1) return null;
  const cur = p[p.length - 1];
  const avg = Math.round(p.reduce((a, b) => a + b, 0) / p.length);
  const min = Math.min(...p), max = Math.max(...p);
  const trend = p.length > 1 ? ((cur - p[0]) / p[0] * 100).toFixed(1) : '0.0';
  const w = p.slice(-7);
  const mom = w.length > 1 ? ((w[w.length-1] - w[0]) / w[0] * 100).toFixed(1) : '0.0';
  let score = 0;
  if (cur < avg * 1.05) score += 30;
  if (Number(trend) > 15) score += 25;
  if (Number(mom) > 2) score += 20;
  if (cur < max * 0.85) score += 15;
  if (cur < avg * 0.95) score += 10;
  const maxBuy = Math.round(avg * 0.92);
  const g7 = p.length > 7 ? (p[p.length - 1] - p[p.length - 7]) / p[p.length - 7] : 0;
  const target = Math.round(cur * (1 + g7 * 14));
  let label, color, emoji;
  if (p.length < 2)     { label = "Neu";          color = "#888888"; emoji = "🔘"; }
  else if (score >= 70) { label = "Starker Kauf"; color = "#00d97e"; emoji = "🟢"; }
  else if (score >= 45) { label = "Kaufen";       color = "#f5c842"; emoji = "🟡"; }
  else if (score >= 25) { label = "Beobachten";   color = "#ff9f43"; emoji = "🟠"; }
  else                  { label = "Abwarten";     color = "#ff6b6b"; emoji = "🔴"; }
  return { cur, avg, min, max, trend, mom, score, maxBuy, target, label, color, emoji };
}

async function fetchAI(game, a) {
  const prompt = `Du bist ein Retro-Gaming-Investment-Analyst. Erkläre in 2-3 Sätzen auf Deutsch warum "${game.name}" (Nintendo DS, Complete) gerade "${a.label}" ist. Daten: Preis €${a.cur}, Gesamttrend +${a.trend}%, 7-Tage +${a.mom}%, Max-EK €${a.maxBuy}. Direkt und verständlich.`;
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
    });
    return (await r.json()).content?.[0]?.text || "Keine Antwort.";
  } catch { return "KI nicht erreichbar."; }
}

// ── Cover image component with fallback ──────────────────────────────────────
function CoverImage({ name, coverImg, size = 56 }) {
  const [bg, accent] = getCoverColors(name);
  const words = name.replace(/[^a-zA-Z0-9 ]/g,'').split(' ').filter(Boolean);
  const line1 = words.slice(0, Math.ceil(words.length/2)).join(' ');
  const line2 = words.slice(Math.ceil(words.length/2)).join(' ');
  if (coverImg) return (
    <img src={coverImg} alt={name}
      style={{ width: size, height: Math.round(size * 1.35), objectFit: "cover", borderRadius: 6, flexShrink: 0, display: "block" }}
    />
  );
  return (
    <div style={{ width: size, height: Math.round(size * 1.35), borderRadius: 6, background: bg, border: `2px solid ${accent}55`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between", padding: "6px 4px", flexShrink: 0, overflow: "hidden" }}>
      <div style={{ width: "100%", height: 3, background: accent, borderRadius: 2, opacity: 0.8 }}/>
      <div style={{ fontSize: size * 0.22, color: accent, opacity: 0.5, letterSpacing: -1, fontWeight: 800 }}>DS</div>
      <div style={{ textAlign: "center", padding: "0 2px" }}>
        <div style={{ fontSize: size * 0.155, fontWeight: 800, color: accent, lineHeight: 1.2, wordBreak: "break-word" }}>{line1}</div>
        {line2 && <div style={{ fontSize: size * 0.145, fontWeight: 600, color: "#ffffff99", lineHeight: 1.2, wordBreak: "break-word" }}>{line2}</div>}
      </div>
      <div style={{ width: "100%", height: 2, background: accent, borderRadius: 2, opacity: 0.4 }}/>
    </div>
  );
}

const ChartTip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "#1a1a2e", border: "1px solid #2d2d4e", borderRadius: 6, padding: "8px 12px" }}>
      <div style={{ color: "#666", fontSize: 10, marginBottom: 2 }}>{label}</div>
      <div style={{ color: "#f5c842", fontWeight: "bold", fontSize: 14 }}>€{payload[0].value}</div>
    </div>
  );
};

function App() {
  const [games,  setGames]  = useState([]);
  const [view,   setView]   = useState("list");
  const [active, setActive] = useState(null);
  const [aiText, setAiText] = useState("");
  const [aiLoad, setAiLoad] = useState(false);
  const [toast,  setToast]  = useState(null);
  const [iName,  setIName]  = useState("");
  const [iPrice, setIPrice] = useState("");
  const [iErr,   setIErr]   = useState("");
  const [upVal,    setUpVal]    = useState("");
  const [editMode,       setEditMode]       = useState(false);
  const [confirmDelete,  setConfirmDelete]  = useState(false);
  const [sortBy,   setSortBy]   = useState("updated"); // updated | name | price | trend | rating
  const [showUpd, setShowUpd] = useState(false);
  const [tooltip, setTooltip] = useState(null);

  const useLongPress = (text) => {
    const tap = (e) => {
      e.stopPropagation();
      const rect = e.currentTarget.getBoundingClientRect();
      setTooltip({ text, x: rect.left + rect.width/2, y: rect.top - 12 });
      setTimeout(() => setTooltip(null), 3000);
    };
    return { onClick: tap };
  };

  useEffect(() => {
    let saved = LS.get("ri-v5");
    // Strip old demo games, keep only user games, then prepend fresh DEMO
    const userGames = Array.isArray(saved) ? saved.filter(g => !g.isDemo) : [];
    saved = [...DEMO, ...userGames];
    const h = saved.map(g => {
      const last = g.history[g.history.length - 1];
      if (last?.date === today()) return g;
      return { ...g, history: [...g.history, { date: today(), complete: last?.complete || 0 }] };
    });
    setGames(h); LS.set("ri-v5", h);
  }, []);

  const save = g => { LS.set("ri-v5", g); setGames(g); };
  const toast_ = msg => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const addGame = () => {
    setIErr("");
    const name = iName.trim(), price = parseFloat(iPrice);
    if (!name) { setIErr("Spielname eingeben."); return; }
    if (editMode && active) {
      // Edit existing game
      const updated = games.map(g => g.id !== active.id ? g : { ...g, name });
      save(updated);
      setActive(updated.find(g => g.id === active.id));
      setIName(""); setEditMode(false); setView("detail");
      toast_(`"${name}" gespeichert ✓`);
    } else {
      // Add new game
      if (!price || price <= 0) { setIErr("Gültigen Preis eingeben."); return; }
      const g = { id: Date.now(), name, isDemo: false, history: [{ date: today(), complete: price }], coverImg: null, updatedAt: Date.now() };
      const updated = [...games, g];
      save(updated); setIName(""); setIPrice(""); setView("list");
      toast_(`"${name}" hinzugefügt ✓`);
    }
  };

  const updatePrice = () => {
    const p = parseFloat(upVal); if (!p || !active) return;
    const updated = games.map(g => {
      if (g.id !== active.id) return g;
      const hist = [...g.history];
      const entry = { date: today(), complete: p };
      if (hist[hist.length - 1]?.date === today()) hist[hist.length - 1] = entry;
      else hist.push(entry);
      return { ...g, history: hist, updatedAt: Date.now() };
    });
    save(updated);
    setActive(updated.find(g => g.id === active.id));
    setUpVal(""); toast_("Preis aktualisiert ✓");
  };

  const uploadCover = (id, file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const updated = games.map(g => g.id === id ? { ...g, coverImg: e.target.result } : g);
      save(updated);
      setActive(updated.find(g => g.id === id));
      toast_("Cover gespeichert ✓");
    };
    reader.readAsDataURL(file);
  };

  const removeCover = (id) => {
    const updated = games.map(g => g.id === id ? { ...g, coverImg: null } : g);
    save(updated);
    setActive(updated.find(g => g.id === id));
    toast_("Cover entfernt");
  };

  const deleteGame = id => {
    save(games.filter(g => g.id !== id));
    setView("list"); setActive(null); setConfirmDelete(false);
  };

  const openDetail = game => { setActive(game); setView("detail"); setAiText(""); setUpVal(""); setEditMode(false); setConfirmDelete(false); };
  const a = active ? analyze(active) : null;

  const lastUpdated = g => {
    if (!g.updatedAt) return { text: "Noch nicht aktualisiert", color: "#444" };
    const ms = Date.now() - g.updatedAt;
    const days = Math.floor(ms / 86400000);
    if (days < 1)  return { text: "Heute aktualisiert ✓", color: "#00d97e" };
    if (days === 1) return { text: "Gestern aktualisiert",  color: "#f5c842" };
    if (days < 7)  return { text: `Vor ${days} Tagen`,     color: "#ff9f43" };
    return { text: `Vor ${Math.floor(days/7)}W nicht aktualisiert`, color: "#ff6b6b" };
  };

  // ── Sorted games ───────────────────────────────────────────────────────────
  const sortedGames = [...games].sort((a, b) => {
    if (sortBy === "updated") {
      const ta = a.updatedAt || a.id || 0;
      const tb = b.updatedAt || b.id || 0;
      return tb - ta;
    }
    if (sortBy === "name") return a.name.localeCompare(b.name);
    if (sortBy === "price") {
      const pa = a.history[a.history.length-1]?.complete || 0;
      const pb = b.history[b.history.length-1]?.complete || 0;
      return pb - pa;
    }
    if (sortBy === "trend") {
      const ga = analyze(a), gb = analyze(b);
      return Number(gb?.trend || 0) - Number(ga?.trend || 0);
    }
    if (sortBy === "rating") {
      const ga = analyze(a), gb = analyze(b);
      return (gb?.score || 0) - (ga?.score || 0);
    }
    return 0;
  });

  const S = {
    page:  { minHeight: "100vh", background: "#0c0c14", color: "#e0e0f0", fontFamily: "'Outfit',sans-serif" },
    card:  { background: "#111120", border: "1px solid #1e1e35", borderRadius: 12, padding: "16px" },
    input: { width: "100%", background: "#111120", border: "1px solid #2d2d4e", borderRadius: 8, padding: "11px 14px", color: "#e0e0f0", fontSize: 13, outline: "none", fontFamily: "inherit" },
    btnY:  { background: "#f5c842", color: "#0c0c14", border: "none", borderRadius: 8, padding: "10px 16px", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 1 },
  };

  return (
    <div style={S.page}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;}
        @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .gc{transition:border-color .15s,transform .15s;cursor:pointer;}
        .gc:hover{border-color:#f5c84244!important;transform:translateY(-1px);}
        button:active{opacity:.8;}
      `}</style>

      {toast && <div style={{ position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:999,background:"#f5c842",color:"#0c0c14",padding:"7px 18px",borderRadius:20,fontSize:11,fontWeight:700,letterSpacing:1,animation:"pop .2s ease",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Smart-positioned tooltip */}
      {tooltip && (
        <div style={{
          position:"fixed",
          left: Math.min(Math.max(tooltip.x, 16), window.innerWidth - 236),
          top: tooltip.y > 120 ? tooltip.y - 8 : tooltip.y + 32,
          transform: tooltip.y > 120 ? "translateY(-100%)" : "translateY(0)",
          zIndex:1000,
          background:"#1e1e35",
          border:"1px solid #f5c84255",
          borderRadius:10,
          padding:"12px 14px",
          width: Math.min(240, window.innerWidth - 32),
          fontSize:11,
          color:"#ddd",
          lineHeight:1.7,
          boxShadow:"0 8px 24px #00000088",
          animation:"slideUp .2s ease",
          pointerEvents:"none",
        }}>
          {tooltip.text}
        </div>
      )}

      {/* ── LIST ── */}
      {view==="list" && (
        <div style={{animation:"slideUp .3s ease"}}>
          <div style={{padding:"28px 20px 16px",borderBottom:"1px solid #1a1a2e",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontFamily:"'Outfit',sans-serif",fontSize:24,fontWeight:800,color:"#f5c842",letterSpacing:-0.5,lineHeight:1}}>RetroInvest</div>
              <div style={{fontSize:10,color:"#333",letterSpacing:3,marginTop:5}}>NINTENDO DS · COMPLETE</div>
            </div>
            <button style={S.btnY} onClick={()=>setView("add")}>+ SPIEL</button>
          </div>

          {/* Sort bar */}
          <div style={{padding:"8px 20px 0",display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:12}}>
            {[
              ["updated", "🕐 Zuletzt bearbeitet", "Spiele die du zuletzt bearbeitet oder aktualisiert hast erscheinen oben."],
              ["rating",  "⭐ Bestes Rating",       "Sortiert nach Investment-Score. Starker Kauf (🟢) erscheint zuerst."],
              ["trend",   "📈 Stärkster Trend",     "Spiele mit dem größten Preisanstieg seit Beginn des Trackings erscheinen oben."],
              ["price",   "💰 Höchster Preis",      "Sortiert nach aktuellem Complete-Preis, teuerste Spiele zuerst."],
              ["name",    "🔤 Name A–Z",             "Alphabetisch sortiert nach Spielname."],
            ].map(([key, label, tip]) => (
              <div key={key} style={{display:"flex",alignItems:"center",gap:2,flexShrink:0}}>
                <button onClick={()=>setSortBy(key)} style={{
                  padding:"6px 12px", borderRadius:"20px 0 0 20px", fontSize:10, whiteSpace:"nowrap",
                  border: sortBy===key ? "1px solid #f5c842" : "1px solid #1e1e35",
                  borderRight:"none",
                  background: sortBy===key ? "#f5c84222" : "transparent",
                  color: sortBy===key ? "#f5c842" : "#555",
                  cursor:"pointer", letterSpacing:0.5, fontFamily:"inherit",
                }}>{label}</button>
                <button {...useLongPress(tip)} onClick={e=>{ e.stopPropagation(); const rect=e.currentTarget.getBoundingClientRect(); setTooltip({text:tip, x:rect.left+rect.width/2, y:rect.top-12}); setTimeout(()=>setTooltip(null),3000); }} style={{
                  padding:"6px 7px", borderRadius:"0 20px 20px 0", fontSize:9,
                  border: sortBy===key ? "1px solid #f5c842" : "1px solid #1e1e35",
                  background: sortBy===key ? "#f5c84222" : "transparent",
                  color: sortBy===key ? "#f5c84299" : "#333",
                  cursor:"pointer", fontFamily:"inherit", lineHeight:1,
                }}>?</button>
              </div>
            ))}
          </div>

          <div style={{padding:"0 20px 16px"}}>
            {games.length===0 ? (
              <div style={{textAlign:"center",padding:"60px 20px",color:"#2a2a3e"}}>
                <div style={{fontSize:42,marginBottom:14}}>🎮</div>
                <div style={{fontSize:11,letterSpacing:3,color:"#333"}}>NOCH KEINE SPIELE</div>
                <div style={{fontSize:11,color:"#222",marginTop:8}}>Tippe auf + SPIEL um zu starten</div>
              </div>
            ) : sortedGames.map(game => {
              const an = analyze(game);
              if (!an) return null;
              const trendUp = Number(an.trend) >= 0;
              return (
                <div key={game.id} className="gc" onClick={()=>openDetail(game)}
                  style={{...S.card, marginBottom:10, display:"flex", flexDirection:"column", gap:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:8}}>
                        <CoverImage name={game.name} coverImg={game.coverImg} size={52}/>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:"'Outfit',sans-serif",fontSize:15,fontWeight:800,color:"#e8e8ff",marginBottom:5}}>{game.name}</div>
                          <span {...useLongPress(
                          an.label==="Starker Kauf" ? "🟢 Starker Kauf — Preis liegt unter Durchschnitt mit starkem Aufwärtstrend. Guter Zeitpunkt zum Kaufen." :
                          an.label==="Kaufen"       ? "🟡 Kaufen — Solider Aufwärtstrend, Preis noch im grünen Bereich." :
                          an.label==="Beobachten"   ? "🟠 Beobachten — Noch abwarten. Preis entwickelt sich, aber kein klares Kaufsignal." :
                          an.label==="Abwarten"     ? "🔴 Abwarten — Preis aktuell zu hoch oder Trend zu schwach. Noch nicht kaufen." :
                          "🔘 Neu — Noch zu wenig Daten für eine Einschätzung. Täglich öffnen um Verlauf aufzubauen."
                        )} style={{fontSize:10,color:an.color,background:an.color+"18",border:`1px solid ${an.color}44`,padding:"2px 8px",borderRadius:10,userSelect:"none"}}>
                        {an.emoji} {an.label}
                          </span>
                        </div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'Outfit',sans-serif",fontSize:22,fontWeight:800,color:"#f5c842"}}>€{an.cur}</div>
                      <div style={{fontSize:10,color:trendUp?"#00d97e":"#ff6b6b",marginTop:2}}>{trendUp?"▲":"▼"} {Math.abs(Number(an.trend))}%</div>
                    </div>
                  </div>
                  {/* Sparkline */}
                  <div style={{height:40,margin:"0 -4px"}}>
                    <ResponsiveContainer width="100%" height={40}>
                      <LineChart data={game.history.slice(-30)}>
                        <Line type="monotone" dataKey="complete" stroke={an.color} strokeWidth={1.5} dot={false}/>
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                    <span style={{fontSize:9,color:"#333"}}>{game.history.length} Tage Verlauf</span>
                    <span style={{fontSize:9,color:lastUpdated(game).color,fontWeight: lastUpdated(game).color==="#00d97e"?600:400}}>
                      {lastUpdated(game).text}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── DETAIL ── */}
      {view==="detail" && active && a && (
        <div style={{animation:"slideUp .25s ease"}}>
          {/* Back header */}
          <div style={{padding:"16px 20px",borderBottom:"1px solid #1a1a2e"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <button onClick={()=>{setView("list");setShowUpd(false);}} style={{background:"transparent",border:"none",color:"#666",cursor:"pointer",fontSize:20,padding:"2px 6px",lineHeight:1}}>←</button>
              <CoverImage name={active.name} coverImg={active.coverImg} size={44}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{fontFamily:"'Outfit',sans-serif",fontSize:15,fontWeight:800,color:"#e8e8ff",lineHeight:1.2}}>{active.name}</div>
                {!active.isDemo && (
                  <button onClick={()=>{ setIName(active.name); setEditMode(true); setView("add"); }}
                    style={{background:"transparent",border:"none",color:"#444",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1}}>✏️</button>
                )}
              </div>
              <div style={{fontSize:9,marginTop:2,letterSpacing:1,display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"#444"}}>NINTENDO DS</span>
                <span style={{color:"#2a2a3e"}}>·</span>
                <span style={{color:lastUpdated(active).color,fontWeight:lastUpdated(active).color==="#00d97e"?600:400}}>
                  {lastUpdated(active).text}
                </span>
              </div>
            </div>
              {!active.isDemo && !confirmDelete && (
                <button onClick={()=>setConfirmDelete(true)}
                  style={{background:"transparent",border:"1px solid #ff6b6b44",color:"#ff6b6b",cursor:"pointer",fontSize:9,padding:"5px 10px",borderRadius:6,letterSpacing:1}}>
                  LÖSCHEN
                </button>
              )}
              {!active.isDemo && confirmDelete && (
                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                  <span style={{fontSize:9,color:"#ff6b6b"}}>Sicher?</span>
                  <button onClick={()=>deleteGame(active.id)}
                    style={{background:"#ff6b6b",color:"#fff",border:"none",cursor:"pointer",fontSize:9,padding:"5px 10px",borderRadius:6,fontWeight:700,letterSpacing:1}}>
                    JA
                  </button>
                  <button onClick={()=>setConfirmDelete(false)}
                    style={{background:"transparent",color:"#666",border:"1px solid #333",cursor:"pointer",fontSize:9,padding:"5px 10px",borderRadius:6,letterSpacing:1}}>
                    NEIN
                  </button>
                </div>
              )}
            </div>
            {/* Quick action buttons */}
            <div style={{display:"flex",gap:8}}>
              {!active.isDemo && (
                <button onClick={()=>setShowUpd(v=>!v)}
                  style={{flex:1,background:showUpd?"#f5c842":"#1a1a2e",color:showUpd?"#0c0c14":"#f5c842",border:"1px solid #f5c84255",borderRadius:8,padding:"10px",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
                  {showUpd ? "✕ SCHLIESSEN" : "✏️ PREIS UPDATEN"}
                </button>
              )}
              <a href={"https://www.pricecharting.com/search-products?q=" + encodeURIComponent(active.name + " nintendo ds")}
                target="_blank" rel="noopener noreferrer"
                style={{flex:1,background:"#1a1a2e",color:"#4ecdc4",border:"1px solid #4ecdc444",borderRadius:8,padding:"10px",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:1,textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                🔗 PRICECHARTING
              </a>
            </div>
            {/* Inline price update panel */}
            {showUpd && !active.isDemo && (
              <div style={{marginTop:10,display:"flex",gap:8,animation:"slideUp .2s ease"}}>
                <input type="number" value={upVal} onChange={e=>setUpVal(e.target.value)}
                  placeholder={"Neuer Complete-Preis (aktuell: €" + a.cur + ")"}
                  style={{...S.input,flex:1,padding:"10px 14px",fontSize:12}}
                  autoFocus/>
                <button style={{...S.btnY,padding:"10px 18px",fontSize:12}} onClick={()=>{updatePrice();setShowUpd(false);}}>
                  OK
                </button>
              </div>
            )}
          </div>

          <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>

            {/* Hero price */}
            <div style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:9,color:"#444",letterSpacing:3,marginBottom:6}}>AKTUELLER PREIS</div>
                <div style={{fontFamily:"'Outfit',sans-serif",fontSize:46,fontWeight:800,color:"#f5c842",lineHeight:1}}>€{a.cur}</div>
                <div style={{fontSize:11,color:Number(a.trend)>=0?"#00d97e":"#ff6b6b",marginTop:6}}>
                  {Number(a.trend)>=0?"▲":"▼"} {Math.abs(Number(a.trend))}% seit Beginn · {active.history.length} Tage
                </div>
              </div>
              <div {...useLongPress(
                  a.label==="Starker Kauf" ? "🟢 Starker Kauf — Preis liegt unter Durchschnitt mit starkem Aufwärtstrend. Guter Zeitpunkt zum Kaufen." :
                  a.label==="Kaufen"       ? "🟡 Kaufen — Solider Aufwärtstrend, Preis noch im grünen Bereich." :
                  a.label==="Beobachten"   ? "🟠 Beobachten — Noch abwarten. Preis entwickelt sich, aber kein klares Kaufsignal." :
                  a.label==="Abwarten"     ? "🔴 Abwarten — Preis aktuell zu hoch oder Trend zu schwach. Noch nicht kaufen." :
                  "🔘 Neu — Noch zu wenig Daten. Täglich öffnen um Verlauf aufzubauen."
                )} style={{textAlign:"center",background:a.color+"18",border:`2px solid ${a.color}44`,borderRadius:14,padding:"14px 18px",userSelect:"none",cursor:"pointer"}}>
                <div style={{fontSize:28}}>{a.emoji}</div>
                <div style={{fontSize:12,color:a.color,fontWeight:500,marginTop:6,whiteSpace:"nowrap"}}>{a.label}</div>
                <div style={{fontSize:9,color:"#444",marginTop:3}}>{a.score}/100</div>
              </div>
            </div>

            {/* Chart */}
            <div style={S.card}>
              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:14}}>PREISVERLAUF (letzte 90 Tage)</div>
              <ResponsiveContainer width="100%" height={170}>
                <LineChart data={active.history.slice(-90).map(h=>({date:fmtDate(h.date),v:h.complete}))}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>
                  <XAxis dataKey="date" tick={{fill:"#444",fontSize:9}} axisLine={{stroke:"#1a1a2e"}} tickLine={false} interval={Math.floor(active.history.slice(-90).length/5)}/>
                  <YAxis tick={{fill:"#444",fontSize:9}} axisLine={{stroke:"#1a1a2e"}} tickLine={false} width={34}/>
                  <Tooltip content={<ChartTip/>}/>
                  <ReferenceLine y={a.maxBuy} stroke="#f5c84244" strokeDasharray="5 3" label={{value:"MAX EK",fill:"#f5c84277",fontSize:9,position:"insideTopLeft"}}/>
                  <Line type="monotone" dataKey="v" stroke="#f5c842" strokeWidth={2} dot={false} activeDot={{r:4,fill:"#f5c842"}}/>
                </LineChart>
              </ResponsiveContainer>
            </div>

            {/* 3 key numbers */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[
                ["MAX EK",    `€${a.maxBuy}`, "#f5c842", "Nicht mehr zahlen", "💰 Max EK — Empfohlener Höchstpreis zum Kaufen. Basiert auf dem Durchschnittspreis der letzten Wochen minus einem Puffer. Zahlst du weniger, machst du wahrscheinlich ein gutes Geschäft."],
                ["KURSZIEL",  `€${a.target}`, "#4ecdc4", "Ziel in ~2 Wochen", "🎯 Kursziel — Hochrechnung wohin der Preis in ca. 2 Wochen gehen könnte, basierend auf dem aktuellen 7-Tage-Trend. Kein garantierter Wert, nur eine Orientierung."],
                ["Ø PREIS",   `€${a.avg}`,    "#888",    "Durchschnitt", "📊 Ø Preis — Der Durchschnittspreis über deinen gesamten Beobachtungszeitraum. Liegt der aktuelle Preis darunter, ist das ein Kaufsignal."],
              ].map(([lbl,val,col,hint,tipText])=>(
                <div key={lbl} {...useLongPress(tipText)} style={{...S.card,textAlign:"center",padding:"12px 8px",userSelect:"none",cursor:"pointer"}}>
                  <div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:6}}>{lbl}</div>
                  <div style={{fontFamily:"'Outfit',sans-serif",fontSize:19,fontWeight:800,color:col}}>{val}</div>
                  <div style={{fontSize:9,color:"#333",marginTop:4}}>{hint}</div>
                </div>
              ))}
            </div>

            {/* Explanation */}
            <div style={S.card}>
              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:10}}>WAS BEDEUTET DAS?</div>
              <div style={{fontSize:12,color:"#777",lineHeight:1.8}}>
                <b style={{color:"#f5c842"}}>Max EK €{a.maxBuy}</b> — Zahle nicht mehr als diesen Preis. Alles darunter ist ein guter Deal.<br/>
                <b style={{color:"#4ecdc4"}}>Kursziel €{a.target}</b> — Hochrechnung basierend auf den letzten 7 Tagen Trend.<br/>
                <b style={{color:a.color}}>{a.label}</b> — {
                  a.score>=70 ? "Preis liegt unter Durchschnitt mit starkem Aufwärtstrend. Jetzt ist ein guter Zeitpunkt." :
                  a.score>=45 ? "Solider Aufwärtstrend, Preis noch im grünen Bereich. Kaufen ist sinnvoll." :
                  a.score>=25 ? "Preis entwickelt sich, aber noch abwarten und beobachten." :
                  "Preis aktuell zu hoch oder Trend zu schwach. Noch warten."
                }
              </div>
            </div>



            {/* Cover upload */}
            <div style={S.card}>
              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:10}}>COVER-BILD</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <CoverImage name={active.name} coverImg={active.coverImg} size={48}/>
                <div style={{flex:1}}>
                  <label style={{display:"block",background:"#1a1a2e",border:"1px solid #f5c84244",borderRadius:8,padding:"9px 14px",fontSize:11,fontWeight:700,color:"#f5c842",cursor:"pointer",letterSpacing:1,textAlign:"center"}}>
                    📷 BILD HOCHLADEN
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{ if(e.target.files[0]) uploadCover(active.id, e.target.files[0]); }}/>
                  </label>
                  {active.coverImg && (
                    <button onClick={()=>removeCover(active.id)} style={{marginTop:6,width:"100%",background:"transparent",border:"1px solid #ff6b6b44",borderRadius:8,padding:"7px",fontSize:10,color:"#ff6b6b",cursor:"pointer",letterSpacing:1}}>
                      ENTFERNEN
                    </button>
                  )}
                  <div style={{fontSize:9,color:"#333",marginTop:6}}>JPG oder PNG von deinem Gerät</div>
                </div>
              </div>
            </div>

            {/* AI */}
            <div style={S.card}>
              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:10}}>KI-ANALYSE</div>
              {aiText
                ? <p style={{margin:0,fontSize:12,color:"#aaa",lineHeight:1.8}}>{aiText}</p>
                : <p style={{margin:0,fontSize:11,color:"#333"}}>Claude erklärt die Marktlage in einfachen Worten.</p>
              }
              <button style={{...S.btnY,marginTop:12,background:aiLoad?"#1a1a2e":"#f5c842",color:aiLoad?"#555":"#0c0c14",cursor:aiLoad?"not-allowed":"pointer"}}
                onClick={async()=>{setAiLoad(true);setAiText("");const t=await fetchAI(active,a);setAiText(t);setAiLoad(false);}}
                disabled={aiLoad}>
                {aiLoad?"⏳ Analysiere...":"🤖 Analyse starten"}
              </button>
            </div>

          </div>
        </div>
      )}

      {/* ── ADD ── */}
      {view==="add" && (
        <div style={{animation:"slideUp .25s ease"}}>
          <div style={{padding:"18px 20px",borderBottom:"1px solid #1a1a2e",display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>{setView("list");setIErr("");}} style={{background:"transparent",border:"none",color:"#666",cursor:"pointer",fontSize:20,padding:"2px 6px",lineHeight:1}}>←</button>
            <div style={{fontFamily:"'Outfit',sans-serif",fontSize:16,fontWeight:800,color:"#e8e8ff"}}>Spiel hinzufügen</div>
          </div>
          <div style={{padding:"20px"}}>
            <div style={{...S.card,marginBottom:20,fontSize:11,color:"#555",lineHeight:1.8}}>
              💡 Gib den aktuellen <b style={{color:"#f5c842"}}>Complete-Preis</b> ein (Box + Modul + Anleitung).<br/>
              Den Preis findest du auf <b style={{color:"#f5c842"}}>PriceCharting.com</b> → Spiel suchen → "Complete" Spalte.
            </div>

            <div style={{marginBottom:14}}>
              <label style={{fontSize:9,color:"#555",letterSpacing:2,display:"block",marginBottom:6}}>SPIELNAME</label>
              <input value={iName} onChange={e=>setIName(e.target.value)} placeholder="z.B. Radiant Historia" style={S.input}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:9,color:"#555",letterSpacing:2,display:"block",marginBottom:6}}>COMPLETE-PREIS (€)</label>
              <input type="number" value={iPrice} onChange={e=>setIPrice(e.target.value)} placeholder="z.B. 95" style={S.input}/>
              <div style={{fontSize:10,color:"#2a2a3e",marginTop:6}}>Von PriceCharting.com → "Complete" Spalte</div>
            </div>

            {iErr && <div style={{color:"#ff6b6b",fontSize:11,marginBottom:14,padding:"8px 12px",background:"#ff6b6b15",borderRadius:8}}>{iErr}</div>}

            <button style={{...S.btnY,width:"100%",padding:"13px",fontSize:13,borderRadius:10}} onClick={addGame}>
              SPIEL HINZUFÜGEN
            </button>

            <div style={{...S.card,marginTop:20}}>
              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:8}}>WIE FUNKTIONIERT DAS TRACKING?</div>
              <div style={{fontSize:11,color:"#444",lineHeight:1.9}}>
                1. Du gibst heute den aktuellen Preis ein<br/>
                2. Jeden Tag wenn du die App öffnest wird der Preis gespeichert<br/>
                3. Einmal pro Woche den Preis manuell aktualisieren reicht<br/>
                4. Nach 30 Tagen siehst du einen echten Preisverlauf
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{padding:"4px 20px 20px",fontSize:9,color:"#111120",textAlign:"center",letterSpacing:1}}>
        RETRO INVEST · KEINE ANLAGEBERATUNG · DATEN: PRICECHARTING.COM
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
(function(){
  const data = document.getElementById("manifest-data").textContent;
  const link = document.createElement("link");
  link.rel = "manifest";
  link.href = URL.createObjectURL(new Blob([data], {type:"application/json"}));
  document.head.appendChild(link);

  // Apple touch icon
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = 180;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#0c0c14";
  ctx.beginPath(); ctx.roundRect(0,0,180,180,32); ctx.fill();
  ctx.font = "110px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("🎮", 90, 95);
  const il = document.createElement("link");
  il.rel = "apple-touch-icon"; il.href = canvas.toDataURL();
  document.head.appendChild(il);
})();

// Service Worker for offline
if ("serviceWorker" in navigator) {
  const sw = `
    const CACHE = "retro-invest-v1";
    const URLS = [
      "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"
    ];
    self.addEventListener("install", e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS).catch(()=>{})));
      self.skipWaiting();
    });
    self.addEventListener("fetch", e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  navigator.serviceWorker.register(
    URL.createObjectURL(new Blob([sw], {type:"text/javascript"}))
  ).catch(()=>{});
}
</script>
</body>
</html>
