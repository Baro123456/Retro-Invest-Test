<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>RetroInvest</title>
  <meta name="theme-color" content="#0c0c14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="RetroInvest"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; background: #0c0c14; }
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"><div style="background:#0c0c14;height:100vh;display:flex;align-items:center;justify-content:center;color:#f5c842;font-family:sans-serif;font-size:18px;">Lade...</div></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
window.addEventListener('load', function() {
  var script = document.createElement('script');
  script.type = 'text/babel';
  script.dataset.presets = 'react';
  script.textContent = '\nconst LS = {\n  get: k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },\n  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },\n};\n\nconst today = () => new Date().toISOString().slice(0, 10);\nconst fmtDate = d => { try { const [y, m, day] = d.split("-"); return `${day}.${m}.${y.slice(2)}`; } catch { return d; } };\n\n\n// ── Cover color palette ──────────────────────────────────────────────────────\nconst COVER_COLORS = [\n  ["#1a3a2a","#00d97e"], ["#2a1a3a","#c77dff"], ["#3a2a1a","#ff9f43"],\n  ["#1a2a3a","#4ecdc4"], ["#3a1a1a","#ff6b6b"], ["#2a3a1a","#6bcb77"],\n  ["#1a1a3a","#4361ee"], ["#3a1a2a","#f72585"],\n];\nconst getCoverColors = (name) => COVER_COLORS[name.split(\'\').reduce((a,c)=>a+c.charCodeAt(0),0) % COVER_COLORS.length];\n\nfunction makeHistory(base, days = 90) {\n  return Array.from({ length: days + 1 }, (_, i) => {\n    const d = new Date(); d.setDate(d.getDate() - (days - i));\n    const drift = 1 + (i / days) * 0.22 + Math.sin(i * 0.4) * 0.03;\n    return { date: d.toISOString().slice(0, 10), complete: Math.round(base * drift) };\n  });\n}\n\nconst DEMO = [\n  { id: 1, name: "Demo-Spiel", history: makeHistory(95), isDemo: true, coverImg: null },\n];\n\nfunction analyze(game) {\n  const p = game.history.map(h => h.complete);\n  if (p.length < 1) return null;\n  const cur = p[p.length - 1];\n  const avg = Math.round(p.reduce((a, b) => a + b, 0) / p.length);\n  const min = Math.min(...p), max = Math.max(...p);\n  const trend = p.length > 1 ? ((cur - p[0]) / p[0] * 100).toFixed(1) : \'0.0\';\n  const w = p.slice(-7);\n  const mom = w.length > 1 ? ((w[w.length-1] - w[0]) / w[0] * 100).toFixed(1) : \'0.0\';\n  let score = 0;\n  if (cur < avg * 1.05) score += 30;\n  if (Number(trend) > 15) score += 25;\n  if (Number(mom) > 2) score += 20;\n  if (cur < max * 0.85) score += 15;\n  if (cur < avg * 0.95) score += 10;\n  const maxBuy = Math.round(avg * 0.92);\n  const g7 = p.length > 7 ? (p[p.length - 1] - p[p.length - 7]) / p[p.length - 7] : 0;\n  const target = Math.round(cur * (1 + g7 * 14));\n  let label, color, emoji;\n  if (p.length < 2)     { label = "Neu";          color = "#888888"; emoji = "🔘"; }\n  else if (score >= 70) { label = "Starker Kauf"; color = "#00d97e"; emoji = "🟢"; }\n  else if (score >= 45) { label = "Kaufen";       color = "#f5c842"; emoji = "🟡"; }\n  else if (score >= 25) { label = "Beobachten";   color = "#ff9f43"; emoji = "🟠"; }\n  else                  { label = "Abwarten";     color = "#ff6b6b"; emoji = "🔴"; }\n  return { cur, avg, min, max, trend, mom, score, maxBuy, target, label, color, emoji };\n}\n\nasync function fetchAI(game, a) {\n  const prompt = `Du bist ein Retro-Gaming-Investment-Analyst. Erkläre in 2-3 Sätzen auf Deutsch warum "${game.name}" (Nintendo DS, Complete) gerade "${a.label}" ist. Daten: Preis €${a.cur}, Gesamttrend +${a.trend}%, 7-Tage +${a.mom}%, Max-EK €${a.maxBuy}. Direkt und verständlich.`;\n  try {\n    const r = await fetch("https://api.anthropic.com/v1/messages", {\n      method: "POST", headers: { "Content-Type": "application/json" },\n      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })\n    });\n    return (await r.json()).content?.[0]?.text || "Keine Antwort.";\n  } catch { return "KI nicht erreichbar."; }\n}\n\n// ── Cover image component with fallback ──────────────────────────────────────\nfunction CoverImage({ name, coverImg, size = 56 }) {\n  const [bg, accent] = getCoverColors(name);\n  const words = name.replace(/[^a-zA-Z0-9 ]/g,\'\').split(\' \').filter(Boolean);\n  const line1 = words.slice(0, Math.ceil(words.length/2)).join(\' \');\n  const line2 = words.slice(Math.ceil(words.length/2)).join(\' \');\n  if (coverImg) return (\n    <img src={coverImg} alt={name}\n      style={{ width: size, height: Math.round(size * 1.35), objectFit: "cover", borderRadius: 6, flexShrink: 0, display: "block" }}\n    />\n  );\n  return (\n    <div style={{ width: size, height: Math.round(size * 1.35), borderRadius: 6, background: bg, border: `2px solid ${accent}55`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between", padding: "6px 4px", flexShrink: 0, overflow: "hidden" }}>\n      <div style={{ width: "100%", height: 3, background: accent, borderRadius: 2, opacity: 0.8 }}/>\n      <div style={{ fontSize: size * 0.22, color: accent, opacity: 0.5, letterSpacing: -1, fontWeight: 800 }}>DS</div>\n      <div style={{ textAlign: "center", padding: "0 2px" }}>\n        <div style={{ fontSize: size * 0.155, fontWeight: 800, color: accent, lineHeight: 1.2, wordBreak: "break-word" }}>{line1}</div>\n        {line2 && <div style={{ fontSize: size * 0.145, fontWeight: 600, color: "#ffffff99", lineHeight: 1.2, wordBreak: "break-word" }}>{line2}</div>}\n      </div>\n      <div style={{ width: "100%", height: 2, background: accent, borderRadius: 2, opacity: 0.4 }}/>\n    </div>\n  );\n}\n\nconst ChartTip = ({ active, payload, label }) => {\n  if (!active || !payload?.length) return null;\n  return (\n    <div style={{ background: "#1a1a2e", border: "1px solid #2d2d4e", borderRadius: 6, padding: "8px 12px" }}>\n      <div style={{ color: "#666", fontSize: 10, marginBottom: 2 }}>{label}</div>\n      <div style={{ color: "#f5c842", fontWeight: "bold", fontSize: 14 }}>€{payload[0].value}</div>\n    </div>\n  );\n};\n\nfunction App() {\n  const [games,  setGames]  = useState([]);\n  const [view,   setView]   = useState("list");\n  const [active, setActive] = useState(null);\n  const [aiText, setAiText] = useState("");\n  const [aiLoad, setAiLoad] = useState(false);\n  const [toast,  setToast]  = useState(null);\n  const [iName,  setIName]  = useState("");\n  const [iPrice, setIPrice] = useState("");\n  const [iErr,   setIErr]   = useState("");\n  const [upVal,    setUpVal]    = useState("");\n  const [editMode,       setEditMode]       = useState(false);\n  const [confirmDelete,  setConfirmDelete]  = useState(false);\n  const [sortBy,   setSortBy]   = useState("updated"); // updated | name | price | trend | rating\n  const [showUpd, setShowUpd] = useState(false);\n  const [tooltip, setTooltip] = useState(null);\n\n  const useLongPress = (text) => {\n    const tap = (e) => {\n      e.stopPropagation();\n      const rect = e.currentTarget.getBoundingClientRect();\n      setTooltip({ text, x: rect.left + rect.width/2, y: rect.top - 12 });\n      setTimeout(() => setTooltip(null), 3000);\n    };\n    return { onClick: tap };\n  };\n\n  useEffect(() => {\n    let saved = LS.get("ri-v5");\n    // Strip old demo games, keep only user games, then prepend fresh DEMO\n    const userGames = Array.isArray(saved) ? saved.filter(g => !g.isDemo) : [];\n    saved = [...DEMO, ...userGames];\n    const h = saved.map(g => {\n      const last = g.history[g.history.length - 1];\n      if (last?.date === today()) return g;\n      return { ...g, history: [...g.history, { date: today(), complete: last?.complete || 0 }] };\n    });\n    setGames(h); LS.set("ri-v5", h);\n  }, []);\n\n  const save = g => { LS.set("ri-v5", g); setGames(g); };\n  const toast_ = msg => { setToast(msg); setTimeout(() => setToast(null), 2200); };\n\n  const addGame = () => {\n    setIErr("");\n    const name = iName.trim(), price = parseFloat(iPrice);\n    if (!name) { setIErr("Spielname eingeben."); return; }\n    if (editMode && active) {\n      // Edit existing game\n      const updated = games.map(g => g.id !== active.id ? g : { ...g, name });\n      save(updated);\n      setActive(updated.find(g => g.id === active.id));\n      setIName(""); setEditMode(false); setView("detail");\n      toast_(`"${name}" gespeichert ✓`);\n    } else {\n      // Add new game\n      if (!price || price <= 0) { setIErr("Gültigen Preis eingeben."); return; }\n      const g = { id: Date.now(), name, isDemo: false, history: [{ date: today(), complete: price }], coverImg: null, updatedAt: Date.now() };\n      const updated = [...games, g];\n      save(updated); setIName(""); setIPrice(""); setView("list");\n      toast_(`"${name}" hinzugefügt ✓`);\n    }\n  };\n\n  const updatePrice = () => {\n    const p = parseFloat(upVal); if (!p || !active) return;\n    const updated = games.map(g => {\n      if (g.id !== active.id) return g;\n      const hist = [...g.history];\n      const entry = { date: today(), complete: p };\n      if (hist[hist.length - 1]?.date === today()) hist[hist.length - 1] = entry;\n      else hist.push(entry);\n      return { ...g, history: hist, updatedAt: Date.now() };\n    });\n    save(updated);\n    setActive(updated.find(g => g.id === active.id));\n    setUpVal(""); toast_("Preis aktualisiert ✓");\n  };\n\n  const uploadCover = (id, file) => {\n    const reader = new FileReader();\n    reader.onload = (e) => {\n      const updated = games.map(g => g.id === id ? { ...g, coverImg: e.target.result } : g);\n      save(updated);\n      setActive(updated.find(g => g.id === id));\n      toast_("Cover gespeichert ✓");\n    };\n    reader.readAsDataURL(file);\n  };\n\n  const removeCover = (id) => {\n    const updated = games.map(g => g.id === id ? { ...g, coverImg: null } : g);\n    save(updated);\n    setActive(updated.find(g => g.id === id));\n    toast_("Cover entfernt");\n  };\n\n  const deleteGame = id => {\n    save(games.filter(g => g.id !== id));\n    setView("list"); setActive(null); setConfirmDelete(false);\n  };\n\n  const openDetail = game => { setActive(game); setView("detail"); setAiText(""); setUpVal(""); setEditMode(false); setConfirmDelete(false); };\n  const a = active ? analyze(active) : null;\n\n  const lastUpdated = g => {\n    if (!g.updatedAt) return { text: "Noch nicht aktualisiert", color: "#444" };\n    const ms = Date.now() - g.updatedAt;\n    const days = Math.floor(ms / 86400000);\n    if (days < 1)  return { text: "Heute aktualisiert ✓", color: "#00d97e" };\n    if (days === 1) return { text: "Gestern aktualisiert",  color: "#f5c842" };\n    if (days < 7)  return { text: `Vor ${days} Tagen`,     color: "#ff9f43" };\n    return { text: `Vor ${Math.floor(days/7)}W nicht aktualisiert`, color: "#ff6b6b" };\n  };\n\n  // ── Sorted games ───────────────────────────────────────────────────────────\n  const sortedGames = [...games].sort((a, b) => {\n    if (sortBy === "updated") {\n      const ta = a.updatedAt || a.id || 0;\n      const tb = b.updatedAt || b.id || 0;\n      return tb - ta;\n    }\n    if (sortBy === "name") return a.name.localeCompare(b.name);\n    if (sortBy === "price") {\n      const pa = a.history[a.history.length-1]?.complete || 0;\n      const pb = b.history[b.history.length-1]?.complete || 0;\n      return pb - pa;\n    }\n    if (sortBy === "trend") {\n      const ga = analyze(a), gb = analyze(b);\n      return Number(gb?.trend || 0) - Number(ga?.trend || 0);\n    }\n    if (sortBy === "rating") {\n      const ga = analyze(a), gb = analyze(b);\n      return (gb?.score || 0) - (ga?.score || 0);\n    }\n    return 0;\n  });\n\n  const S = {\n    page:  { minHeight: "100vh", background: "#0c0c14", color: "#e0e0f0", fontFamily: "\'Outfit\',sans-serif" },\n    card:  { background: "#111120", border: "1px solid #1e1e35", borderRadius: 12, padding: "16px" },\n    input: { width: "100%", background: "#111120", border: "1px solid #2d2d4e", borderRadius: 8, padding: "11px 14px", color: "#e0e0f0", fontSize: 13, outline: "none", fontFamily: "inherit" },\n    btnY:  { background: "#f5c842", color: "#0c0c14", border: "none", borderRadius: 8, padding: "10px 16px", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 1 },\n  };\n\n  return (\n    <div style={S.page}>\n      <style>{`\n        @import url(\'https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap\');\n        *{box-sizing:border-box;}\n        @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n        @keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n        .gc{transition:border-color .15s,transform .15s;cursor:pointer;}\n        .gc:hover{border-color:#f5c84244!important;transform:translateY(-1px);}\n        button:active{opacity:.8;}\n      `}</style>\n\n      {toast && <div style={{ position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:999,background:"#f5c842",color:"#0c0c14",padding:"7px 18px",borderRadius:20,fontSize:11,fontWeight:700,letterSpacing:1,animation:"pop .2s ease",whiteSpace:"nowrap"}}>{toast}</div>}\n\n      {/* Smart-positioned tooltip */}\n      {tooltip && (\n        <div style={{\n          position:"fixed",\n          left: Math.min(Math.max(tooltip.x, 16), window.innerWidth - 236),\n          top: tooltip.y > 120 ? tooltip.y - 8 : tooltip.y + 32,\n          transform: tooltip.y > 120 ? "translateY(-100%)" : "translateY(0)",\n          zIndex:1000,\n          background:"#1e1e35",\n          border:"1px solid #f5c84255",\n          borderRadius:10,\n          padding:"12px 14px",\n          width: Math.min(240, window.innerWidth - 32),\n          fontSize:11,\n          color:"#ddd",\n          lineHeight:1.7,\n          boxShadow:"0 8px 24px #00000088",\n          animation:"slideUp .2s ease",\n          pointerEvents:"none",\n        }}>\n          {tooltip.text}\n        </div>\n      )}\n\n      {/* ── LIST ── */}\n      {view==="list" && (\n        <div style={{animation:"slideUp .3s ease"}}>\n          <div style={{padding:"28px 20px 16px",borderBottom:"1px solid #1a1a2e",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>\n            <div>\n              <div style={{fontFamily:"\'Outfit\',sans-serif",fontSize:24,fontWeight:800,color:"#f5c842",letterSpacing:-0.5,lineHeight:1}}>RetroInvest</div>\n              <div style={{fontSize:10,color:"#333",letterSpacing:3,marginTop:5}}>NINTENDO DS · COMPLETE</div>\n            </div>\n            <button style={S.btnY} onClick={()=>setView("add")}>+ SPIEL</button>\n          </div>\n\n          {/* Sort bar */}\n          <div style={{padding:"8px 20px 0",display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:12}}>\n            {[\n              ["updated", "🕐 Zuletzt bearbeitet", "Spiele die du zuletzt bearbeitet oder aktualisiert hast erscheinen oben."],\n              ["rating",  "⭐ Bestes Rating",       "Sortiert nach Investment-Score. Starker Kauf (🟢) erscheint zuerst."],\n              ["trend",   "📈 Stärkster Trend",     "Spiele mit dem größten Preisanstieg seit Beginn des Trackings erscheinen oben."],\n              ["price",   "💰 Höchster Preis",      "Sortiert nach aktuellem Complete-Preis, teuerste Spiele zuerst."],\n              ["name",    "🔤 Name A–Z",             "Alphabetisch sortiert nach Spielname."],\n            ].map(([key, label, tip]) => (\n              <div key={key} style={{display:"flex",alignItems:"center",gap:2,flexShrink:0}}>\n                <button onClick={()=>setSortBy(key)} style={{\n                  padding:"6px 12px", borderRadius:"20px 0 0 20px", fontSize:10, whiteSpace:"nowrap",\n                  border: sortBy===key ? "1px solid #f5c842" : "1px solid #1e1e35",\n                  borderRight:"none",\n                  background: sortBy===key ? "#f5c84222" : "transparent",\n                  color: sortBy===key ? "#f5c842" : "#555",\n                  cursor:"pointer", letterSpacing:0.5, fontFamily:"inherit",\n                }}>{label}</button>\n                <button {...useLongPress(tip)} onClick={e=>{ e.stopPropagation(); const rect=e.currentTarget.getBoundingClientRect(); setTooltip({text:tip, x:rect.left+rect.width/2, y:rect.top-12}); setTimeout(()=>setTooltip(null),3000); }} style={{\n                  padding:"6px 7px", borderRadius:"0 20px 20px 0", fontSize:9,\n                  border: sortBy===key ? "1px solid #f5c842" : "1px solid #1e1e35",\n                  background: sortBy===key ? "#f5c84222" : "transparent",\n                  color: sortBy===key ? "#f5c84299" : "#333",\n                  cursor:"pointer", fontFamily:"inherit", lineHeight:1,\n                }}>?</button>\n              </div>\n            ))}\n          </div>\n\n          <div style={{padding:"0 20px 16px"}}>\n            {games.length===0 ? (\n              <div style={{textAlign:"center",padding:"60px 20px",color:"#2a2a3e"}}>\n                <div style={{fontSize:42,marginBottom:14}}>🎮</div>\n                <div style={{fontSize:11,letterSpacing:3,color:"#333"}}>NOCH KEINE SPIELE</div>\n                <div style={{fontSize:11,color:"#222",marginTop:8}}>Tippe auf + SPIEL um zu starten</div>\n              </div>\n            ) : sortedGames.map(game => {\n              const an = analyze(game);\n              if (!an) return null;\n              const trendUp = Number(an.trend) >= 0;\n              return (\n                <div key={game.id} className="gc" onClick={()=>openDetail(game)}\n                  style={{...S.card, marginBottom:10, display:"flex", flexDirection:"column", gap:0}}>\n                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>\n                    <div>\n                      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:8}}>\n                        <CoverImage name={game.name} coverImg={game.coverImg} size={52}/>\n                        <div style={{flex:1}}>\n                          <div style={{fontFamily:"\'Outfit\',sans-serif",fontSize:15,fontWeight:800,color:"#e8e8ff",marginBottom:5}}>{game.name}</div>\n                          <span {...useLongPress(\n                          an.label==="Starker Kauf" ? "🟢 Starker Kauf — Preis liegt unter Durchschnitt mit starkem Aufwärtstrend. Guter Zeitpunkt zum Kaufen." :\n                          an.label==="Kaufen"       ? "🟡 Kaufen — Solider Aufwärtstrend, Preis noch im grünen Bereich." :\n                          an.label==="Beobachten"   ? "🟠 Beobachten — Noch abwarten. Preis entwickelt sich, aber kein klares Kaufsignal." :\n                          an.label==="Abwarten"     ? "🔴 Abwarten — Preis aktuell zu hoch oder Trend zu schwach. Noch nicht kaufen." :\n                          "🔘 Neu — Noch zu wenig Daten für eine Einschätzung. Täglich öffnen um Verlauf aufzubauen."\n                        )} style={{fontSize:10,color:an.color,background:an.color+"18",border:`1px solid ${an.color}44`,padding:"2px 8px",borderRadius:10,userSelect:"none"}}>\n                        {an.emoji} {an.label}\n                          </span>\n                        </div>\n                      </div>\n                    </div>\n                    <div style={{textAlign:"right"}}>\n                      <div style={{fontFamily:"\'Outfit\',sans-serif",fontSize:22,fontWeight:800,color:"#f5c842"}}>€{an.cur}</div>\n                      <div style={{fontSize:10,color:trendUp?"#00d97e":"#ff6b6b",marginTop:2}}>{trendUp?"▲":"▼"} {Math.abs(Number(an.trend))}%</div>\n                    </div>\n                  </div>\n                  {/* Sparkline */}\n                  <div style={{height:40,margin:"0 -4px"}}>\n                    <ResponsiveContainer width="100%" height={40}>\n                      <LineChart data={game.history.slice(-30)}>\n                        <Line type="monotone" dataKey="complete" stroke={an.color} strokeWidth={1.5} dot={false}/>\n                      </LineChart>\n                    </ResponsiveContainer>\n                  </div>\n                  <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>\n                    <span style={{fontSize:9,color:"#333"}}>{game.history.length} Tage Verlauf</span>\n                    <span style={{fontSize:9,color:lastUpdated(game).color,fontWeight: lastUpdated(game).color==="#00d97e"?600:400}}>\n                      {lastUpdated(game).text}\n                    </span>\n                  </div>\n                </div>\n              );\n            })}\n          </div>\n        </div>\n      )}\n\n      {/* ── DETAIL ── */}\n      {view==="detail" && active && a && (\n        <div style={{animation:"slideUp .25s ease"}}>\n          {/* Back header */}\n          <div style={{padding:"16px 20px",borderBottom:"1px solid #1a1a2e"}}>\n            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>\n              <button onClick={()=>{setView("list");setShowUpd(false);}} style={{background:"transparent",border:"none",color:"#666",cursor:"pointer",fontSize:20,padding:"2px 6px",lineHeight:1}}>←</button>\n              <CoverImage name={active.name} coverImg={active.coverImg} size={44}/>\n            <div style={{flex:1}}>\n              <div style={{display:"flex",alignItems:"center",gap:6}}>\n                <div style={{fontFamily:"\'Outfit\',sans-serif",fontSize:15,fontWeight:800,color:"#e8e8ff",lineHeight:1.2}}>{active.name}</div>\n                {!active.isDemo && (\n                  <button onClick={()=>{ setIName(active.name); setEditMode(true); setView("add"); }}\n                    style={{background:"transparent",border:"none",color:"#444",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1}}>✏️</button>\n                )}\n              </div>\n              <div style={{fontSize:9,marginTop:2,letterSpacing:1,display:"flex",alignItems:"center",gap:6}}>\n                <span style={{color:"#444"}}>NINTENDO DS</span>\n                <span style={{color:"#2a2a3e"}}>·</span>\n                <span style={{color:lastUpdated(active).color,fontWeight:lastUpdated(active).color==="#00d97e"?600:400}}>\n                  {lastUpdated(active).text}\n                </span>\n              </div>\n            </div>\n              {!active.isDemo && !confirmDelete && (\n                <button onClick={()=>setConfirmDelete(true)}\n                  style={{background:"transparent",border:"1px solid #ff6b6b44",color:"#ff6b6b",cursor:"pointer",fontSize:9,padding:"5px 10px",borderRadius:6,letterSpacing:1}}>\n                  LÖSCHEN\n                </button>\n              )}\n              {!active.isDemo && confirmDelete && (\n                <div style={{display:"flex",gap:5,alignItems:"center"}}>\n                  <span style={{fontSize:9,color:"#ff6b6b"}}>Sicher?</span>\n                  <button onClick={()=>deleteGame(active.id)}\n                    style={{background:"#ff6b6b",color:"#fff",border:"none",cursor:"pointer",fontSize:9,padding:"5px 10px",borderRadius:6,fontWeight:700,letterSpacing:1}}>\n                    JA\n                  </button>\n                  <button onClick={()=>setConfirmDelete(false)}\n                    style={{background:"transparent",color:"#666",border:"1px solid #333",cursor:"pointer",fontSize:9,padding:"5px 10px",borderRadius:6,letterSpacing:1}}>\n                    NEIN\n                  </button>\n                </div>\n              )}\n            </div>\n            {/* Quick action buttons */}\n            <div style={{display:"flex",gap:8}}>\n              {!active.isDemo && (\n                <button onClick={()=>setShowUpd(v=>!v)}\n                  style={{flex:1,background:showUpd?"#f5c842":"#1a1a2e",color:showUpd?"#0c0c14":"#f5c842",border:"1px solid #f5c84255",borderRadius:8,padding:"10px",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:1}}>\n                  {showUpd ? "✕ SCHLIESSEN" : "✏️ PREIS UPDATEN"}\n                </button>\n              )}\n              <a href={"https://www.pricecharting.com/search-products?q=" + encodeURIComponent(active.name + " nintendo ds")}\n                target="_blank" rel="noopener noreferrer"\n                style={{flex:1,background:"#1a1a2e",color:"#4ecdc4",border:"1px solid #4ecdc444",borderRadius:8,padding:"10px",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:1,textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>\n                🔗 PRICECHARTING\n              </a>\n            </div>\n            {/* Inline price update panel */}\n            {showUpd && !active.isDemo && (\n              <div style={{marginTop:10,display:"flex",gap:8,animation:"slideUp .2s ease"}}>\n                <input type="number" value={upVal} onChange={e=>setUpVal(e.target.value)}\n                  placeholder={"Neuer Complete-Preis (aktuell: €" + a.cur + ")"}\n                  style={{...S.input,flex:1,padding:"10px 14px",fontSize:12}}\n                  autoFocus/>\n                <button style={{...S.btnY,padding:"10px 18px",fontSize:12}} onClick={()=>{updatePrice();setShowUpd(false);}}>\n                  OK\n                </button>\n              </div>\n            )}\n          </div>\n\n          <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>\n\n            {/* Hero price */}\n            <div style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}>\n              <div>\n                <div style={{fontSize:9,color:"#444",letterSpacing:3,marginBottom:6}}>AKTUELLER PREIS</div>\n                <div style={{fontFamily:"\'Outfit\',sans-serif",fontSize:46,fontWeight:800,color:"#f5c842",lineHeight:1}}>€{a.cur}</div>\n                <div style={{fontSize:11,color:Number(a.trend)>=0?"#00d97e":"#ff6b6b",marginTop:6}}>\n                  {Number(a.trend)>=0?"▲":"▼"} {Math.abs(Number(a.trend))}% seit Beginn · {active.history.length} Tage\n                </div>\n              </div>\n              <div {...useLongPress(\n                  a.label==="Starker Kauf" ? "🟢 Starker Kauf — Preis liegt unter Durchschnitt mit starkem Aufwärtstrend. Guter Zeitpunkt zum Kaufen." :\n                  a.label==="Kaufen"       ? "🟡 Kaufen — Solider Aufwärtstrend, Preis noch im grünen Bereich." :\n                  a.label==="Beobachten"   ? "🟠 Beobachten — Noch abwarten. Preis entwickelt sich, aber kein klares Kaufsignal." :\n                  a.label==="Abwarten"     ? "🔴 Abwarten — Preis aktuell zu hoch oder Trend zu schwach. Noch nicht kaufen." :\n                  "🔘 Neu — Noch zu wenig Daten. Täglich öffnen um Verlauf aufzubauen."\n                )} style={{textAlign:"center",background:a.color+"18",border:`2px solid ${a.color}44`,borderRadius:14,padding:"14px 18px",userSelect:"none",cursor:"pointer"}}>\n                <div style={{fontSize:28}}>{a.emoji}</div>\n                <div style={{fontSize:12,color:a.color,fontWeight:500,marginTop:6,whiteSpace:"nowrap"}}>{a.label}</div>\n                <div style={{fontSize:9,color:"#444",marginTop:3}}>{a.score}/100</div>\n              </div>\n            </div>\n\n            {/* Chart */}\n            <div style={S.card}>\n              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:14}}>PREISVERLAUF (letzte 90 Tage)</div>\n              <ResponsiveContainer width="100%" height={170}>\n                <LineChart data={active.history.slice(-90).map(h=>({date:fmtDate(h.date),v:h.complete}))}>\n                  <CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>\n                  <XAxis dataKey="date" tick={{fill:"#444",fontSize:9}} axisLine={{stroke:"#1a1a2e"}} tickLine={false} interval={Math.floor(active.history.slice(-90).length/5)}/>\n                  <YAxis tick={{fill:"#444",fontSize:9}} axisLine={{stroke:"#1a1a2e"}} tickLine={false} width={34}/>\n                  <Tooltip content={<ChartTip/>}/>\n                  <ReferenceLine y={a.maxBuy} stroke="#f5c84244" strokeDasharray="5 3" label={{value:"MAX EK",fill:"#f5c84277",fontSize:9,position:"insideTopLeft"}}/>\n                  <Line type="monotone" dataKey="v" stroke="#f5c842" strokeWidth={2} dot={false} activeDot={{r:4,fill:"#f5c842"}}/>\n                </LineChart>\n              </ResponsiveContainer>\n            </div>\n\n            {/* 3 key numbers */}\n            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>\n              {[\n                ["MAX EK",    `€${a.maxBuy}`, "#f5c842", "Nicht mehr zahlen", "💰 Max EK — Empfohlener Höchstpreis zum Kaufen. Basiert auf dem Durchschnittspreis der letzten Wochen minus einem Puffer. Zahlst du weniger, machst du wahrscheinlich ein gutes Geschäft."],\n                ["KURSZIEL",  `€${a.target}`, "#4ecdc4", "Ziel in ~2 Wochen", "🎯 Kursziel — Hochrechnung wohin der Preis in ca. 2 Wochen gehen könnte, basierend auf dem aktuellen 7-Tage-Trend. Kein garantierter Wert, nur eine Orientierung."],\n                ["Ø PREIS",   `€${a.avg}`,    "#888",    "Durchschnitt", "📊 Ø Preis — Der Durchschnittspreis über deinen gesamten Beobachtungszeitraum. Liegt der aktuelle Preis darunter, ist das ein Kaufsignal."],\n              ].map(([lbl,val,col,hint,tipText])=>(\n                <div key={lbl} {...useLongPress(tipText)} style={{...S.card,textAlign:"center",padding:"12px 8px",userSelect:"none",cursor:"pointer"}}>\n                  <div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:6}}>{lbl}</div>\n                  <div style={{fontFamily:"\'Outfit\',sans-serif",fontSize:19,fontWeight:800,color:col}}>{val}</div>\n                  <div style={{fontSize:9,color:"#333",marginTop:4}}>{hint}</div>\n                </div>\n              ))}\n            </div>\n\n            {/* Explanation */}\n            <div style={S.card}>\n              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:10}}>WAS BEDEUTET DAS?</div>\n              <div style={{fontSize:12,color:"#777",lineHeight:1.8}}>\n                <b style={{color:"#f5c842"}}>Max EK €{a.maxBuy}</b> — Zahle nicht mehr als diesen Preis. Alles darunter ist ein guter Deal.<br/>\n                <b style={{color:"#4ecdc4"}}>Kursziel €{a.target}</b> — Hochrechnung basierend auf den letzten 7 Tagen Trend.<br/>\n                <b style={{color:a.color}}>{a.label}</b> — {\n                  a.score>=70 ? "Preis liegt unter Durchschnitt mit starkem Aufwärtstrend. Jetzt ist ein guter Zeitpunkt." :\n                  a.score>=45 ? "Solider Aufwärtstrend, Preis noch im grünen Bereich. Kaufen ist sinnvoll." :\n                  a.score>=25 ? "Preis entwickelt sich, aber noch abwarten und beobachten." :\n                  "Preis aktuell zu hoch oder Trend zu schwach. Noch warten."\n                }\n              </div>\n            </div>\n\n\n\n            {/* Cover upload */}\n            <div style={S.card}>\n              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:10}}>COVER-BILD</div>\n              <div style={{display:"flex",alignItems:"center",gap:12}}>\n                <CoverImage name={active.name} coverImg={active.coverImg} size={48}/>\n                <div style={{flex:1}}>\n                  <label style={{display:"block",background:"#1a1a2e",border:"1px solid #f5c84244",borderRadius:8,padding:"9px 14px",fontSize:11,fontWeight:700,color:"#f5c842",cursor:"pointer",letterSpacing:1,textAlign:"center"}}>\n                    📷 BILD HOCHLADEN\n                    <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{ if(e.target.files[0]) uploadCover(active.id, e.target.files[0]); }}/>\n                  </label>\n                  {active.coverImg && (\n                    <button onClick={()=>removeCover(active.id)} style={{marginTop:6,width:"100%",background:"transparent",border:"1px solid #ff6b6b44",borderRadius:8,padding:"7px",fontSize:10,color:"#ff6b6b",cursor:"pointer",letterSpacing:1}}>\n                      ENTFERNEN\n                    </button>\n                  )}\n                  <div style={{fontSize:9,color:"#333",marginTop:6}}>JPG oder PNG von deinem Gerät</div>\n                </div>\n              </div>\n            </div>\n\n            {/* AI */}\n            <div style={S.card}>\n              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:10}}>KI-ANALYSE</div>\n              {aiText\n                ? <p style={{margin:0,fontSize:12,color:"#aaa",lineHeight:1.8}}>{aiText}</p>\n                : <p style={{margin:0,fontSize:11,color:"#333"}}>Claude erklärt die Marktlage in einfachen Worten.</p>\n              }\n              <button style={{...S.btnY,marginTop:12,background:aiLoad?"#1a1a2e":"#f5c842",color:aiLoad?"#555":"#0c0c14",cursor:aiLoad?"not-allowed":"pointer"}}\n                onClick={async()=>{setAiLoad(true);setAiText("");const t=await fetchAI(active,a);setAiText(t);setAiLoad(false);}}\n                disabled={aiLoad}>\n                {aiLoad?"⏳ Analysiere...":"🤖 Analyse starten"}\n              </button>\n            </div>\n\n          </div>\n        </div>\n      )}\n\n      {/* ── ADD ── */}\n      {view==="add" && (\n        <div style={{animation:"slideUp .25s ease"}}>\n          <div style={{padding:"18px 20px",borderBottom:"1px solid #1a1a2e",display:"flex",alignItems:"center",gap:10}}>\n            <button onClick={()=>{setView("list");setIErr("");}} style={{background:"transparent",border:"none",color:"#666",cursor:"pointer",fontSize:20,padding:"2px 6px",lineHeight:1}}>←</button>\n            <div style={{fontFamily:"\'Outfit\',sans-serif",fontSize:16,fontWeight:800,color:"#e8e8ff"}}>Spiel hinzufügen</div>\n          </div>\n          <div style={{padding:"20px"}}>\n            <div style={{...S.card,marginBottom:20,fontSize:11,color:"#555",lineHeight:1.8}}>\n              💡 Gib den aktuellen <b style={{color:"#f5c842"}}>Complete-Preis</b> ein (Box + Modul + Anleitung).<br/>\n              Den Preis findest du auf <b style={{color:"#f5c842"}}>PriceCharting.com</b> → Spiel suchen → "Complete" Spalte.\n            </div>\n\n            <div style={{marginBottom:14}}>\n              <label style={{fontSize:9,color:"#555",letterSpacing:2,display:"block",marginBottom:6}}>SPIELNAME</label>\n              <input value={iName} onChange={e=>setIName(e.target.value)} placeholder="z.B. Radiant Historia" style={S.input}/>\n            </div>\n            <div style={{marginBottom:20}}>\n              <label style={{fontSize:9,color:"#555",letterSpacing:2,display:"block",marginBottom:6}}>COMPLETE-PREIS (€)</label>\n              <input type="number" value={iPrice} onChange={e=>setIPrice(e.target.value)} placeholder="z.B. 95" style={S.input}/>\n              <div style={{fontSize:10,color:"#2a2a3e",marginTop:6}}>Von PriceCharting.com → "Complete" Spalte</div>\n            </div>\n\n            {iErr && <div style={{color:"#ff6b6b",fontSize:11,marginBottom:14,padding:"8px 12px",background:"#ff6b6b15",borderRadius:8}}>{iErr}</div>}\n\n            <button style={{...S.btnY,width:"100%",padding:"13px",fontSize:13,borderRadius:10}} onClick={addGame}>\n              SPIEL HINZUFÜGEN\n            </button>\n\n            <div style={{...S.card,marginTop:20}}>\n              <div style={{fontSize:9,color:"#444",letterSpacing:2,marginBottom:8}}>WIE FUNKTIONIERT DAS TRACKING?</div>\n              <div style={{fontSize:11,color:"#444",lineHeight:1.9}}>\n                1. Du gibst heute den aktuellen Preis ein<br/>\n                2. Jeden Tag wenn du die App öffnest wird der Preis gespeichert<br/>\n                3. Einmal pro Woche den Preis manuell aktualisieren reicht<br/>\n                4. Nach 30 Tagen siehst du einen echten Preisverlauf\n              </div>\n            </div>\n          </div>\n        </div>\n      )}\n\n      <div style={{padding:"4px 20px 20px",fontSize:9,color:"#111120",textAlign:"center",letterSpacing:1}}>\n        RETRO INVEST · KEINE ANLAGEBERATUNG · DATEN: PRICECHARTING.COM\n      </div>\n    </div>\n  );\n}\n\nReactDOM.createRoot(document.getElementById("root")).render(<App/>);';
  document.body.appendChild(script);
  Babel.transformScriptTags();
});
</script>
<script>
(function(){
  var canvas = document.createElement("canvas");
  canvas.width = canvas.height = 180;
  var ctx = canvas.getContext("2d");
  ctx.fillStyle = "#0c0c14";
  ctx.beginPath(); ctx.roundRect(0,0,180,180,32); ctx.fill();
  ctx.font = "110px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("🎮", 90, 95);
  var il = document.createElement("link");
  il.rel = "apple-touch-icon"; il.href = canvas.toDataURL();
  document.head.appendChild(il);

  var manifest = {
    name: "RetroInvest",
    short_name: "RetroInvest",
    start_url: "./index.html",
    display: "standalone",
    background_color: "#0c0c14",
    theme_color: "#0c0c14"
  };
  var ml = document.createElement("link");
  ml.rel = "manifest";
  ml.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type:"application/json"}));
  document.head.appendChild(ml);
})();
</script>
