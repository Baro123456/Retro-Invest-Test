<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RetroInvest</title>
  <meta name="theme-color" content="#0c0c14"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c0c14; color: #e0e0f0; font-family: sans-serif; }
    #root { padding: 20px; }
  </style>
</head>
<body>
<div id="root"><p style="color:#f5c842;padding:20px">Lade...</p></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
// Wait for everything to load before running Babel
window.addEventListener('load', function() {
  var script = document.createElement('script');
  script.type = 'text/babel';
  script.dataset.presets = 'react';
  script.textContent = `
    function App() {
      return (
        <div style={{padding: 20}}>
          <h1 style={{color: "#f5c842", fontSize: 24, fontWeight: 800}}>RetroInvest</h1>
          <p style={{color: "#888", marginTop: 8, fontSize: 12}}>NINTENDO DS · COMPLETE</p>
          <p style={{color: "#00d97e", marginTop: 20, fontSize: 14}}>✓ App läuft erfolgreich!</p>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  `;
  document.body.appendChild(script);
  Babel.transformScriptTags();
});
</script>
</body>
</html>
